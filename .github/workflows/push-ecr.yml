name: Build and Push to ECR
 
on:
  push:
    branches: [main]
    # Comentamos temporalmente paths para que se ejecute con tus cambios actuales de infra
    # paths:
    #   - "backend/**"
    #   - "frontend/**"
 
permissions:
  id-token: write
  contents: read
 
env:
  # Ajusta a 'vars' si los guardaste como Variables en lugar de Secrets en GitHub
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
 
jobs:
  build-and-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, tag, and push backend image
        working-directory: backend
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # CORREGIDO: Se cambiaron los nombres para que coincidan EXACTAMENTE con Terraform
          docker build -t $ECR_REGISTRY/ulises-backend:$SHA \
                       -t $ECR_REGISTRY/ulises-backend:latest .
          docker push $ECR_REGISTRY/ulises-backend:$SHA
          docker push $ECR_REGISTRY/ulises-backend:latest
          echo "Pushed backend:$SHA"
 
  build-and-push-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, tag, and push frontend image
        working-directory: frontend
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # CORREGIDO: Se cambiaron los nombres para que coincidan EXACTAMENTE con Terraform
          docker build -t $ECR_REGISTRY/ulises-frontend:$SHA \
                       -t $ECR_REGISTRY/ulises-frontend:latest .
          docker push $ECR_REGISTRY/ulises-frontend:$SHA
          docker push $ECR_REGISTRY/ulises-frontend:latest
          echo "Pushed frontend:$SHA"